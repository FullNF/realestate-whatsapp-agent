services:
  - type: web
    name: realestate-whatsapp-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Real Estate WhatsApp Agent
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_API_VERSION
        value: v21.0
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: BUSINESS_NAME
        value: YouWe Realty
      - key: AGENT_NAME
        value: Riya
      - key: SERVICE_AREAS
        value: Sector 70
      - key: OUT_OF_AREA_MAX_ATTEMPTS
        value: "4"
      - key: DISCLOSE_AI
        value: "true"
      - key: ADMIN_API_KEY
        sync: false
      - key: ADMIN_NOTIFY_PHONE
        sync: false
